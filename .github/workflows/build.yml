name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64
          - name: macOS
            os: macos-latest
            target: Mac

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Sets up environment compilation caches for CMake
      - name: Setup Build Environment
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.config.target }}-cache-v1

      # FIX: We download the Geode CLI manually so we can pass the automatic overwrite flag
      - name: Download Geode CLI
        uses: robinraju/release-downloader@v1.10
        with:
          repository: "geode-sdk/cli"
          latest: true
          fileName: "*win.zip"
          out-file-path: "my-epic-geode-cli"
        if: matrix.config.target == 'Win64'

      - name: Extract Geode CLI (Windows)
        run: 7z x "my-epic-geode-cli/*-win.zip" "-omy-epic-geode-cli" -aoa
        shell: bash
        if: matrix.config.target == 'Win64'

      # Downloads and sets up the tool on Linux runners (Android targets)
      - name: Download Geode CLI (Android)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: "geode-sdk/cli"
          latest: true
          fileName: "*linux.zip"
          out-file-path: "my-epic-geode-cli"
        if: startsWith(matrix.config.target, 'Android')

      - name: Extract Geode CLI (Android)
        run: 7z x "my-epic-geode-cli/*-linux.zip" "-omy-epic-geode-cli" -aoa
        shell: bash
        if: startsWith(matrix.config.target, 'Android')

      # Downloads and sets up the tool on macOS runners
      - name: Download Geode CLI (macOS)
        uses: robinraju/release-downloader@v1.10
        with:
          repository: "geode-sdk/cli"
          latest: true
          fileName: "*mac.zip"
          out-file-path: "my-epic-geode-cli"
        if: matrix.config.target == 'Mac'

      - name: Extract Geode CLI (macOS)
        run: 7z x "my-epic-geode-cli/*-mac.zip" "-omy-epic-geode-cli" -aoa
        shell: bash
        if: matrix.config.target == 'Mac'

      # Adds the newly extracted tool directory to the system PATH environment
      - name: Add CLI to Path
        run: echo "${{ github.workspace }}/my-epic-geode-cli" >> $GITHUB_PATH
        shell: bash

      # Compiles your C++ and CMake project files into final binaries
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

  package:
    name: Package Mod
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Merge Platform Builds
        uses: geode-sdk/build-geode-mod/combine@main

