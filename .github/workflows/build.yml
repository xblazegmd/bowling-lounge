name: Build Geode Mod (Windows & Android)

on:
  push:
    branches:
      - '**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            build/vcpkg_installed
          key: ${{ runner.os }}-geode-${{ hashFiles('**/CMakeLists.txt', '**/mod.json') }}
          restore-keys: |
            ${{ runner.os }}-geode-

      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true

  package:
    name: Package Builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - name: Combine Platform Artifacts
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
