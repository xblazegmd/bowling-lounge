name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: windows-latest
            target: Win64
          - os: macos-latest
            target: MacOS
          - os: macos-latest
            target: iOS
          - os: ubuntu-latest
            target: Android64
          - os: ubuntu-latest
            target: Android32

    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Geode CLI
        uses: geode-sdk/cli/.github/actions/setup@main

      - name: Clear CPM Cache (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path "cpm-cache") {
            Remove-Item -Recurse -Force "cpm-cache"
          }
        shell: powershell

      - name: Build Mod Binary
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

