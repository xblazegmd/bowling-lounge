name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: iOS
            os: macos-latest
            target: ios
          - name: Android
            os: ubuntu-latest
            target: android

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This single line handles the entire cross-platform toolchain build cleanly
      - name: Build Mod Binary
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

