name: Build Geode Mod (Windows & Android)

on:
  push:
    branches:
      - '**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
            sdk_path: ${{ github.workspace }}/geode-sdk
          - name: Android
            os: ubuntu-latest
            target: Android64
            sdk_path: /home/runner/.local/share/Geode/sdk

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            build/vcpkg_installed
          key: ${{ runner.os }}-geode-${{ hashFiles('**/CMakeLists.txt', '**/mod.json') }}
          restore-keys: |
            ${{ runner.os }}-geode-

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        env:
          GEODE_SDK: ${{ matrix.config.sdk_path }}
        with:
          target: ${{ matrix.config.target }}

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bowling-lounge-${{ matrix.config.target }}
          path: build/*.geode
