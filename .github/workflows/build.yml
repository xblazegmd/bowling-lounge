name: Build Geode Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Custom-tailored to only include stable platforms
        platform: [win, mac, android]

    runs-on: ${{ matrix.platform == 'win' && 'windows-latest' || matrix.platform == 'mac' && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Using the corrected, updated Geode builder action
      - name: Build Geode Mod
        uses: geode-sdk/build-config@v2
