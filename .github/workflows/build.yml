name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-2022
            target: Win64
          - name: Android 64-bit
            os: ubuntu-latest
            target: Android64
          - name: Android 32-bit (S6 Lite Compatibility)
            os: ubuntu-latest
            target: Android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.geode
          key: ${{ matrix.config.target }}-${{ github.sha }}
          restore-keys: ${{ matrix.config.target }}-

      # FIXED: Uses Geode's native NDK system instead of a separate action
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          cli: false
          android-ndk-version: r26b

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-build-${{ matrix.config.target }}
          path: "**/*.geode"

  package:
    name: Package Final Mod
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          path: platform-bins
          pattern: geode-build-*
          merge-multiple: true

      - name: Combine Binaries Into One Mod
        uses: geode-sdk/build-geode-mod/combine@main
        with:
          source: platform-bins
          output: CosmicBowlingLounge.geode

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: CosmicBowlingLounge-Final
          path: CosmicBowlingLounge.geode
