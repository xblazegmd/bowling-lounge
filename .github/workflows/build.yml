name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: Win64
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}

      # FIX 1: Upload each platform with its own unique matrix name to prevent conflicts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-build-${{ matrix.config.name }}
          path: |
            build/**/*.geode
            build/**/*.so
            build/**/*.dll
            *.geode

  combine:
    name: Combine builds
    runs-on: ubuntu-latest
    needs: ['build']
    steps:
      - uses: actions/checkout@v4
      
      # FIX 2: Download ALL platform files cleanly into the root using a pattern match
      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: geode-build-*
          merge-multiple: true
          path: .

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Cosmic-Bowling-Lounge-Mod
          path: ${{ steps.build.outputs.build-output }}

